<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#07101f"/>
  
  <!-- Pentagon nodes -->
  <circle cx="50" cy="15" r="6" fill="#4a9eff"/>
  <circle cx="85" cy="35" r="6" fill="#4a9eff"/>
  <circle cx="72" cy="80" r="6" fill="#4a9eff"/>
  <circle cx="28" cy="80" r="6" fill="#4a9eff"/>
  <circle cx="15" cy="35" r="6" fill="#4a9eff"/>
  
  <!-- Pentagon connections -->
  <line x1="50" y1="15" x2="85" y2="35" stroke="#4a9eff" stroke-width="1.5"/>
  <line x1="85" y1="35" x2="72" y2="80" stroke="#4a9eff" stroke-width="1.5"/>
  <line x1="72" y1="80" x2="28" y2="80" stroke="#4a9eff" stroke-width="1.5"/>
  <line x1="28" y1="80" x2="15" y2="35" stroke="#4a9eff" stroke-width="1.5"/>
  <line x1="15" y1="35" x2="50" y2="15" stroke="#4a9eff" stroke-width="1.5"/>
</svg>